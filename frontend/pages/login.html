<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — HeartBeat</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <main class="auth-page">

        <!-- Back Button -->
        <a href="/" class="auth-back">&larr; Back</a>

        <!-- Logo -->
        <div class="auth-logo">
            <img src="/images/heartbeatlogo.png" alt="HeartBeat Logo" class="heart-logo">
        </div>

        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Log in to your account</p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Login Form -->
        <form class="auth-form" method="POST" action="/login">

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-auth">Log In</button>

        </form>

        <p class="auth-switch">
            Don't have an account? <a href="/register">Sign Up</a>
        </p>

    </main>

</body>
</html>
