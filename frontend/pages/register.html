<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — HeartBeat</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <main class="auth-page">

        <!-- Back Button -->
        <a href="/" class="auth-back">&larr; Back</a>

        <!-- Logo -->
        <div class="auth-logo">
            <img src="/images/heartbeatlogo.png" alt="HeartBeat Logo" class="heart-logo">
        </div>

        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Sign up to get started</p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Sign Up Form -->
        <form class="auth-form" method="POST" action="/register">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" minlength="6" required>
            </div>

            <button type="submit" class="btn btn-primary btn-auth">Sign Up</button>

        </form>

        <p class="auth-switch">
            Already have an account? <a href="/login">Log In</a>
        </p>

    </main>

</body>
</html>
