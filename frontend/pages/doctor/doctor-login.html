<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login — HeartBeat</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-page">
        <a href="/" class="auth-back">&#8592; Back</a>

        <div class="auth-logo">
            <img src="/images/heartbeatlogo.png" alt="HeartBeat" class="heart-logo">
        </div>

        <h1 class="auth-title">Doctor Portal</h1>
        <p class="auth-subtitle">Sign in to manage your patients</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/doctor/login" method="POST" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="doctor@heartbeat.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">Sign In</button>
        </form>

        <p class="auth-switch">
            Patient? <a href="/login">Log in here</a>
        </p>
    </div>
</body>
</html>
